name: E2E Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
    tags-ignore: ['v*']
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: github.event.pull_request.draft != true

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 'latest'

      - name: Install OpenCode CLI
        run: npm install -g opencode

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run E2E tests (direct)
        run: npm run test:e2e
        env:
          OPENPAUL_DEBUG: "false"

      - name: Build Docker image
        run: docker build -f Dockerfile.e2e -t openpaul-e2e:test .

      - name: Run E2E tests (Docker)
        run: docker run --rm openpaul-e2e:test
        continue-on-error: true

      - name: Collect failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            /tmp/openpaul-e2e-*
            .openpaul/
          retention-days: 7
          if-no-files-found: ignore
