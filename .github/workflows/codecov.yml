name: Codecov Coverage Upload

on:
  # COV-01: Triggered by test.yml; internal step waits for e2e-tests.yml too before uploading
  workflow_run:
    workflows: ["CI - Unit Tests"]
    types: [completed]

# Cancel redundant runs on same ref
concurrency:
  group: codecov-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codecov:
    # Only run when test.yml succeeded
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      # COV-06: Skip draft PRs
      - name: Check if draft PR
        id: check_draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          if [ "${{ github.event.workflow_run.event }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
            if [ -n "$PR_NUMBER" ]; then
              IS_DRAFT=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft --jq '.isDraft')
              if [ "$IS_DRAFT" = "true" ]; then
                echo "Skipping draft PR"
                echo "skip=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      # COV-01: Wait for both test.yml AND e2e-tests.yml to succeed for this commit
      - name: Wait for both test workflows to complete
        if: steps.check_draft.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"
          MAX_WAIT_MINUTES=30
          POLL_INTERVAL_SECONDS=30
          MAX_ATTEMPTS=$((MAX_WAIT_MINUTES * 60 / POLL_INTERVAL_SECONDS))
          
          echo "Waiting for both test workflows to complete for commit: $SHA"
          echo "Max wait time: $MAX_WAIT_MINUTES minutes"
          
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt of $MAX_ATTEMPTS..."
            
            # Check CI - Unit Tests status
            TEST_STATUS=$(gh run list --repo "$REPO" --workflow "CI - Unit Tests" --commit "$SHA" --limit 1 --json conclusion --jq '.[0].conclusion // "unknown"')
            echo "  CI - Unit Tests: $TEST_STATUS"
            
            # Check E2E Tests status
            E2E_STATUS=$(gh run list --repo "$REPO" --workflow "E2E Tests" --commit "$SHA" --limit 1 --json conclusion --jq '.[0].conclusion // "unknown"')
            echo "  E2E Tests: $E2E_STATUS"
            
            # Handle failure cases
            if [ "$TEST_STATUS" = "failure" ] || [ "$E2E_STATUS" = "failure" ]; then
              echo "One or more workflows failed - skipping coverage upload"
              exit 0
            fi
            
            # Handle cancelled cases
            if [ "$TEST_STATUS" = "cancelled" ] || [ "$E2E_STATUS" = "cancelled" ]; then
              echo "One or more workflows were cancelled - skipping coverage upload"
              exit 0
            fi
            
            # Check if both succeeded
            if [ "$TEST_STATUS" = "success" ] && [ "$E2E_STATUS" = "success" ]; then
              echo "Both test workflows succeeded, proceeding with coverage upload"
              exit 0
            fi
            
            # Still waiting - check if workflows exist at all
            if [ "$TEST_STATUS" = "unknown" ] || [ "$E2E_STATUS" = "unknown" ]; then
              # Check if workflow has started but not completed
              TEST_RUN_ID=$(gh run list --repo "$REPO" --workflow "CI - Unit Tests" --commit "$SHA" --limit 1 --json databaseId --jq '.[0].databaseId // empty')
              E2E_RUN_ID=$(gh run list --repo "$REPO" --workflow "E2E Tests" --commit "$SHA" --limit 1 --json databaseId --jq '.[0].databaseId // empty')
              
              if [ -z "$TEST_RUN_ID" ] || [ -z "$E2E_RUN_ID" ]; then
                echo "One or more workflows have not started yet..."
              else
                echo "Workflows in progress, waiting..."
              fi
            fi
            
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Waiting ${POLL_INTERVAL_SECONDS}s before next check..."
              sleep $POLL_INTERVAL_SECONDS
            fi
          done
          
          echo "Timeout reached after $MAX_WAIT_MINUTES minutes"
          echo "One or more workflows did not complete in time"
          exit 0

      - name: Checkout repository
        if: steps.check_draft.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # COV-02: Download coverage artifact from test.yml
      - name: Download coverage artifact
        if: steps.check_draft.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      # COV-03: Upload coverage to Codecov with token authentication
      - name: Upload coverage to Codecov
        if: steps.check_draft.outputs.skip != 'true'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: true
          verbose: true
          commit_parent: ${{ github.event.workflow_run.head_sha }}
